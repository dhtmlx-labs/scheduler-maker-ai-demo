services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_SOCKET_URL: ${VITE_SOCKET_URL_DOCKER:-http://localhost:3001}
    container_name: scheduler-maker-ai-demo-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: scheduler-maker-ai-demo-backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      PORT: 3001
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN_DOCKER:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      MODEL: ${MODEL:-gpt-5-nano}
