services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: scheduler-maker-ai-demo-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/frontend/node_modules
      - /app/backend/node_modules
    environment:
      VITE_SOCKET_URL: ${VITE_SOCKET_URL_DOCKER:-http://localhost:3001}
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: scheduler-maker-ai-demo-backend-dev
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/frontend/node_modules
      - /app/backend/node_modules
    env_file:
      - .env
    environment:
      PORT: 3001
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN_DOCKER:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      MODEL: ${MODEL:-gpt-5-nano}
