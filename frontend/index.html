<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scheduler Maker AI Demo</title>
  </head>
  <body>
    <main id="app">
      <section class="app-shell" aria-label="Scheduler Maker AI Demo">
        <section class="workspace-layout">
          <aside
            id="incoming_requests_panel"
            class="incoming-panel"
            aria-label="Incoming requests"
          >
            <div class="panel-header">
              <div>
                <p class="eyebrow">Intake</p>
                <h2>Incoming Requests</h2>
              </div>
              <span id="incoming_requests_count" class="count-pill"></span>
            </div>
            <div
              id="incoming_requests_list"
              class="incoming-list"
              aria-label="Unscheduled service requests"
            ></div>
          </aside>

          <section class="scheduler-layout" aria-label="Scheduled appointments">
            <div
              id="scheduler_here"
              class="scheduler-container"
              aria-label="Technician appointment timeline"
            ></div>
          </section>

          <aside id="chat_panel" class="chat-panel" aria-label="AI dispatcher chat">
            <div class="panel-header">
              <div>
                <p class="eyebrow">AI Assistant</p>
                <h2>Dispatch Chat</h2>
              </div>
            </div>
            <div class="chat-placeholder">
              <p>Chat connection will be added in a later step.</p>
            </div>
          </aside>
        </section>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
