<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scheduler Maker AI Demo</title>
  </head>
  <body>
    <main id="app">
      <section class="app-shell" aria-label="Office Building Maintenance Scheduler Maker AI Demo">
        <section class="workspace-layout">
          <aside
            id="incoming_requests_panel"
            class="incoming-panel"
            aria-label="Incoming requests"
          >
            <div class="panel-header">
              <div>
                <p class="eyebrow">Intake</p>
                <h2>Incoming Requests</h2>
              </div>
              <span id="incoming_requests_count" class="count-pill"></span>
            </div>
            <div
              id="incoming_requests_list"
              class="incoming-list"
              aria-label="Unscheduled maintenance requests"
            ></div>
          </aside>

          <section class="scheduler-layout" aria-label="Scheduled maintenance work orders">
            <div
              id="scheduler_here"
              class="scheduler-container"
              aria-label="Maintenance staff work order timeline"
            ></div>
          </section>

          <aside id="chat_panel" class="chat-panel" aria-label="AI facilities chat">
            <div class="panel-header">
              <div>
                <p class="eyebrow">AI Assistant</p>
                <h2>Facilities Chat</h2>
              </div>
            </div>
            <div class="chat-placeholder">
              <p>Chat connection will be added in a later step.</p>
            </div>
          </aside>
        </section>
      </section>
    </main>

    <footer class="dhx_demo-footer">
      <div class="dhx_layout-cell-content">
        <a
          href="https://dhtmlx.com/docs/demo/ai-org-chart-builder/"
          title="Previous Demo"
          class="dhx_slider-btn dhx_slider-btn--prev"
        >
          <svg width="15" height="15" viewBox="0 0 15 15" aria-hidden="true">
            <path d="M0.820312 6.67969V8.32031H10.8203L6.25 12.9297L7.42188 14.1016L14.0234 7.5L7.42188 0.898438L6.25 2.07031L10.8203 6.67969H0.820312Z" fill="#fff"></path>
          </svg>
        </a>
        <a
          href="https://dhtmlx.com/docs/demo/ai-gantt-theme-builder/"
          title="Next Demo"
          class="dhx_slider-btn dhx_slider-btn--next"
        >
          <svg width="15" height="15" viewBox="0 0 15 15" aria-hidden="true">
            <path d="M0.820312 6.67969V8.32031H10.8203L6.25 12.9297L7.42188 14.1016L14.0234 7.5L7.42188 0.898438L6.25 2.07031L10.8203 6.67969H0.820312Z" fill="#fff"></path>
          </svg>
        </a>
        <div class="dhx_demo-footer-text">
          <h1>AI Helper for DHTMLX Scheduler.</h1>
          <p>Your AI assistant for managing <a href="https://dhtmlx.com/docs/products/dhtmlxScheduler/" target="_blank" rel="noreferrer">DHTMLX Scheduler</a> from text.</p>
        </div>
        <a href="https://github.com/DHTMLX/scheduler-maker-ai-demo" class="dhx_sample-btn dhx_sample-btn--cta" target="_blank" rel="noreferrer">View on GitHub</a>
      </div>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
